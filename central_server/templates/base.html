<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}HoangSec{% endblock %}</title>
    <style>
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --red: #f85149;
        --green: #3fb950;
        --yellow: #d29922;
        --blue: #58a6ff;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        min-height: 100vh;
      }
      nav {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 2rem;
        display: flex;
        align-items: center;
        gap: 2rem;
        height: 56px;
      }
      nav .brand {
        color: var(--blue);
        font-weight: 700;
        font-size: 1.1rem;
        text-decoration: none;
      }
      nav a {
        color: var(--muted);
        text-decoration: none;
        font-size: 0.9rem;
      }
      nav a:hover {
        color: var(--text);
      }
      main {
        padding: 2rem;
        max-width: 1400px;
        margin: 0 auto;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1.5rem;
      }
      .badge-red {
        color: var(--red);
      }
      .badge-green {
        color: var(--green);
      }
      .badge-yellow {
        color: var(--yellow);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        text-align: left;
        padding: 0.75rem 1rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.875rem;
      }
      th {
        color: var(--muted);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: rgba(255, 255, 255, 0.03);
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" class="brand">🛡 HoangSec</a>
      <a href="/">Dashboard</a>
      <a href="/docs">API Docs</a>
    </nav>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
